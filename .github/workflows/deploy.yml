# ──────────────────────────────────────────────────────────────────────────────
# CI/CD: Build → Test → Deploy to Azure Container Apps
#
# Required repository secrets:
#   AZURE_CREDENTIALS          – JSON output of `az ad sp create-for-rbac`
#   AZURE_RESOURCE_GROUP       – Azure resource group that contains the Container Apps environment
#   AZURE_CONTAINERAPPS_ENV    – Azure Container Apps environment name
#   ACR_LOGIN_SERVER           – Azure Container Registry login server (e.g. myregistry.azurecr.io)
#   ACR_USERNAME               – ACR admin / service-principal username
#   ACR_PASSWORD               – ACR admin / service-principal password
#
# Secrets passed as environment variables to the running backend container
# (set these under Settings → Secrets and variables → Actions, and also as
#  Container Apps secrets via `az containerapp secret set`):
#   DATABASE_URL               – PostgreSQL connection string (required)
#   SESSION_SECRET             – Random secret for Express sessions (required)
#   TOKEN_ENCRYPTION_KEY       – AES-256 key for OAuth token encryption, min 32 chars (required)
#   GOOGLE_CLIENT_ID           – Google OAuth client ID (optional)
#   GOOGLE_CLIENT_SECRET       – Google OAuth client secret (optional)
#   GOOGLE_CALLBACK_URL        – Google OAuth callback URL, e.g. https://<backend-fqdn>/api/v1/auth/google/callback (optional)
#   MICROSOFT_CLIENT_ID        – Microsoft OAuth client ID (optional)
#   MICROSOFT_CLIENT_SECRET    – Microsoft OAuth client secret (optional)
#   MICROSOFT_CALLBACK_URL     – Microsoft OAuth callback URL, e.g. https://<backend-fqdn>/api/v1/auth/microsoft/callback (optional)
#   AI_API_KEY                 – API key for OpenAI / Azure OpenAI (optional)
#   AI_ENDPOINT                – Azure OpenAI endpoint URL (optional)
#   CORS_ORIGIN                – Allowed CORS origin (defaults to * if omitted)
# ──────────────────────────────────────────────────────────────────────────────

name: CI/CD – Build, Test & Deploy

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  BACKEND_IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/cloud-organiser-backend
  FRONTEND_IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/cloud-organiser-frontend

jobs:
  # ── 1. Lint & Test ────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --ci --forceExit

  # ── 2. Build & Push Docker images ─────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    # Only build and push on pushes to main/master (not on pull requests)
    if: github.event_name == 'push'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy to Azure Container Apps ─────────────────────────────────────────
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Node.js for migrations
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies for migrations
        run: npm ci

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy

      - name: Deploy backend container app
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppEnvironment: ${{ secrets.AZURE_CONTAINERAPPS_ENV }}
          containerAppName: cloud-organiser-backend
          imageToDeploy: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          registryUrl: ${{ secrets.ACR_LOGIN_SERVER }}
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}
          targetPort: 3000
          environmentVariables: >
            NODE_ENV=production
            PORT=3000
            DATABASE_URL=secretref:database-url
            SESSION_SECRET=secretref:session-secret
            TOKEN_ENCRYPTION_KEY=secretref:token-encryption-key
            GOOGLE_CLIENT_ID=secretref:google-client-id
            GOOGLE_CLIENT_SECRET=secretref:google-client-secret
            GOOGLE_CALLBACK_URL=secretref:google-callback-url
            MICROSOFT_CLIENT_ID=secretref:microsoft-client-id
            MICROSOFT_CLIENT_SECRET=secretref:microsoft-client-secret
            MICROSOFT_CALLBACK_URL=secretref:microsoft-callback-url
            AI_PROVIDER=local
            AI_API_KEY=secretref:ai-api-key
            AI_ENDPOINT=secretref:ai-endpoint
            CORS_ORIGIN=secretref:cors-origin

      - name: Deploy frontend container app
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppEnvironment: ${{ secrets.AZURE_CONTAINERAPPS_ENV }}
          containerAppName: cloud-organiser-frontend
          imageToDeploy: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          registryUrl: ${{ secrets.ACR_LOGIN_SERVER }}
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}
          targetPort: 80

      - name: Log out from Azure
        if: always()
        run: az logout
